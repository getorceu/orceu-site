<style>

    .section-head {
      max-width: 980px;
      margin: 0 auto;
      text-align: center;
    }

    .audience-section .section-head {
      width: min(100%, 760px);
      max-width: 760px;
      margin: 0;
      text-align: center;
      z-index: 2;
    }

    .section-head .section-kicker {
      margin-right: auto;
      margin-left: auto;
    }

    .audience-section .section-kicker {
      margin-left: auto;
    }

    .section-head h2 {
      margin: 0 auto;
      color: var(--white);
      font-family: "Axiforma", sans-serif;
      font-size: clamp(2.45rem, 4.8vw, 4.45rem);
      font-weight: 900;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .audience-section .section-head h2 {
      max-width: 720px;
      margin: 0 auto;
      font-size: clamp(1.95rem, 3vw, 3.25rem);
      font-weight: 400;
      line-height: 1.02;
    }

    .audience-section .section-head h2 strong {
      font-weight: 900;
    }

    .audience-title-line {
      display: block;
      white-space: nowrap;
    }

    .audience-title-line + .audience-title-line {
      display: block;
      margin-top: 0.08em;
    }

    .audience-title-strong-line {
      display: block;
      white-space: nowrap;
    }

    .section-head p:not(.section-kicker) {
      max-width: 1180px;
      margin: clamp(18px, 2vw, 24px) auto 0;
      color: rgba(255, 255, 255, 0.8);
      font-size: clamp(0.94rem, 1.1vw, 1.08rem);
      font-weight: 400;
      line-height: 1.58;
    }

    .audience-section .section-head p:not(.section-kicker) {
      max-width: 560px;
      margin-top: clamp(12px, 1.2vw, 16px);
      margin-left: auto;
      white-space: normal;
    }

    .audience-carousel {
      --audience-card-width: 100%;
      --audience-card-height: clamp(250px, 23vw, 308px);
      --audience-card-shift: 0px;
      width: min(100%, 720px);
      height: auto;
      margin: 0;
      align-self: center;
    }

    .audience-carousel-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .audience-nav {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      color: var(--white);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      cursor: pointer;
      transition: background 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .audience-nav:hover,
    .audience-nav:focus-visible {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.28);
      transform: translateY(-1px);
      outline: none;
    }

    .audience-nav svg {
      width: 16px;
      height: 16px;
    }

    .audience-dots {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .audience-dot {
      width: 8px;
      height: 8px;
      padding: 0;
      background: rgba(255, 255, 255, 0.24);
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      transition: width 220ms ease, background 220ms ease;
    }

    .audience-dot.is-active {
      width: 28px;
      background: var(--white);
    }

    .audience-viewport {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: var(--audience-card-height);
      margin: 0 auto;
      padding: 0 38px 34px 0;
      -webkit-mask-image: none;
      mask-image: none;
    }

    .audience-track {
      position: relative;
      width: calc(100% - 38px);
      height: calc(100% - 34px);
    }

    .audience-card {
      --audience-offset: 0;
      --audience-scale: 1;
      --audience-brightness: 0.72;
      --audience-opacity: 0.58;
      display: grid;
      grid-template-columns: clamp(82px, 7.2vw, 104px) minmax(0, 1fr);
      align-items: start;
      column-gap: clamp(16px, 1.8vw, 22px);
      row-gap: 10px;
      position: absolute;
      inset: 0 auto auto 0;
      width: var(--audience-card-width);
      height: 100%;
      aspect-ratio: auto;
      min-height: 0;
      padding: clamp(18px, 1.8vw, 22px) clamp(18px, 2vw, 24px);
      overflow: hidden;
      color: var(--black);
      background: var(--white);
      border: 0;
      border-radius: clamp(24px, 2.4vw, 30px);
      box-shadow: 0 20px 56px rgba(3, 12, 50, 0.18);
      transform: translate(var(--stack-x, 0), var(--stack-y, 0)) scale(var(--stack-scale, 1));
      transform-origin: center center;
      transition: transform 920ms cubic-bezier(0.19, 1, 0.22, 1), box-shadow 920ms ease, opacity 760ms ease, filter 760ms ease, background 760ms ease, border-color 760ms ease;
      filter: brightness(var(--audience-brightness));
      opacity: var(--audience-opacity);
      will-change: transform, opacity, filter;
    }

    .audience-card::after {
      display: none;
    }

    .audience-card > * {
      position: relative;
      z-index: 1;
    }

    .audience-card.is-active {
      --audience-scale: 1;
      --audience-brightness: 1;
      --audience-opacity: 1;
      --stack-x: 0;
      --stack-y: 0;
      --stack-scale: 1;
      z-index: 2;
      box-shadow: 0 24px 64px rgba(3, 12, 50, 0.22), 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .audience-card.is-entering {
      animation: audienceCardIn 820ms cubic-bezier(0.19, 1, 0.22, 1) both;
    }

    .audience-card:not(.is-active) {
      --audience-scale: 1;
      --audience-brightness: 1;
      --audience-opacity: 0.24;
      --stack-scale: 1;
      background: var(--white);
      border: 0;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      box-shadow: 0 14px 34px rgba(3, 12, 50, 0.12);
      pointer-events: none;
    }

    .audience-card:not(.is-active) .audience-media,
    .audience-card:not(.is-active) .audience-profile-head,
    .audience-card:not(.is-active) .audience-copy {
      opacity: 0;
    }

    .audience-card.is-before {
      --stack-x: 14px;
      --stack-y: 12px;
    }

    .audience-card.is-after {
      --stack-x: 28px;
      --stack-y: 24px;
    }

    .audience-card:not(.is-active):hover {
      --audience-scale: 1;
      --audience-brightness: 1;
      --audience-opacity: 0.32;
    }

    @keyframes audienceCardIn {
      0% {
        opacity: 0.46;
        filter: blur(2px) brightness(1.06);
        transform: translate(0, 12px) scale(0.985);
      }

      100% {
        opacity: 1;
        filter: blur(0) brightness(1);
        transform: translate(0, 0) scale(1);
      }
    }

    .audience-profile-head {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      grid-column: 2;
      grid-row: 1;
      min-width: 0;
      margin-top: 0;
    }

    .audience-card h3 {
      order: 1;
      margin: 0;
      color: var(--black);
      font-size: clamp(1.22rem, 1.9vw, 1.95rem);
      font-weight: 900;
      line-height: 0.96;
      letter-spacing: 0;
      text-align: left;
      text-transform: none;
      word-break: normal;
      overflow-wrap: normal;
      hyphens: none;
    }

    .audience-card.owner h3 {
      font-size: clamp(1.18rem, 1.7vw, 1.72rem);
      line-height: 0.95;
    }

    .audience-card.engineer h3 {
      font-size: clamp(1.2rem, 1.76vw, 1.8rem);
      line-height: 0.94;
    }

    .audience-media {
      position: relative;
      display: block;
      grid-column: 1;
      grid-row: 1 / span 2;
      margin: 0;
      width: clamp(82px, 7.2vw, 104px);
      height: clamp(82px, 7.2vw, 104px);
      aspect-ratio: 1;
    }

    .audience-shape {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .audience-card.owner .audience-media {
      aspect-ratio: 1;
    }

    .audience-card.engineer .audience-media {
      aspect-ratio: 1;
    }

    .audience-card.is-active .audience-media {
      aspect-ratio: 1;
    }

    .audience-card.owner .audience-profile-head,
    .audience-card.engineer .audience-profile-head {
      margin-top: 0;
    }

    .audience-card.owner .audience-copy,
    .audience-card.engineer .audience-copy {
      margin-top: clamp(10px, 1.2vw, 14px);
    }

    .audience-copy {
      position: relative;
      grid-column: 2;
      grid-row: 2;
      display: grid;
      gap: 10px;
      min-width: 0;
      margin-top: 0;
    }

    .audience-card h4 {
      order: 2;
      display: block;
      max-width: none;
      margin: 6px 0 0;
      color: rgba(5, 5, 5, 0.72);
      font-size: clamp(0.72rem, 0.86vw, 0.84rem);
      font-weight: 400;
      line-height: 1.28;
    }

    .audience-card p {
      display: block;
      margin: 0;
      color: var(--black);
      font-size: clamp(0.72rem, 0.82vw, 0.82rem);
      font-weight: 400;
      line-height: 1.34;
      letter-spacing: 0;
    }

    .audience-copy p + p {
      display: block;
    }

    .audience-card.manager h3,
    .audience-card.director h3,
    .audience-card.coordinator h3,
    .audience-card.estimator h3,
    .audience-card.finance h3 {
      font-size: clamp(1.08rem, 1.55vw, 1.58rem);
      line-height: 1.02;
    }

    .audience-profile-head,
    .audience-copy {
      transition: opacity 800ms ease;
    }

    .audience-card strong {
      color: var(--black);
      font-weight: 900;
    }

    .pillar-body strong,
    .audience-closing strong,
    .method-closing strong {
      color: var(--white);
      font-weight: 900;
    }

    .audience-closing,
    .method-closing {
      max-width: 820px;
      margin: clamp(42px, 5vw, 64px) auto 0;
      text-align: center;
    }

    .audience-closing p,
    .method-closing p {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: clamp(1.08rem, 1.55vw, 1.45rem);
      font-weight: 400;
      line-height: 1.48;
    }

    .method-list {
      display: grid;
      gap: 20px;
      margin-top: clamp(44px, 5vw, 64px);
    }

    .pillar-block {
      --pillar-accent: #ffffff;
      position: relative;
      display: grid;
      grid-template-columns: minmax(96px, 150px) minmax(0, 1fr);
      gap: clamp(24px, 4vw, 54px);
      align-items: start;
      padding: clamp(30px, 4vw, 48px);
      overflow: hidden;
      background: rgba(10, 22, 70, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 22px;
      box-shadow: 0 24px 64px rgba(3, 12, 50, 0.18);
    }

    .pillar-block::before {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 6px;
      content: "";
      background: var(--pillar-accent);
    }

    .pillar-block.people {
      --pillar-accent: #050505;
      background: linear-gradient(155deg, rgba(37, 43, 54, 0.9) 0%, rgba(7, 12, 21, 0.94) 58%, rgba(3, 7, 13, 0.96) 100%);
    }

    .pillar-block.process {
      --pillar-accent: #52679f;
      background: linear-gradient(155deg, rgba(82, 103, 159, 0.8) 0%, rgba(39, 59, 123, 0.84) 48%, rgba(25, 40, 93, 0.9) 100%);
    }

    .pillar-block.performance {
      --pillar-accent: #e6e5d8;
      background: linear-gradient(155deg, rgba(124, 160, 255, 0.72) 0%, rgba(50, 99, 236, 0.82) 56%, rgba(36, 75, 211, 0.9) 100%);
    }

    .pillar-number {
      color: transparent;
      font-size: clamp(4rem, 8vw, 7.2rem);
      font-weight: 900;
      line-height: 0.82;
      letter-spacing: 0;
      -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.58);
      text-shadow: 0 0 28px rgba(255, 255, 255, 0.12);
    }

    .pillar-body h3 {
      margin: 0;
      color: var(--white);
      font-size: clamp(1.5rem, 2.4vw, 2.25rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.08em;
    }

    .pillar-anchor {
      margin: 18px 0 0;
      color: var(--white);
      font-size: clamp(1.05rem, 1.35vw, 1.25rem);
      font-weight: 900;
      line-height: 1.36;
    }

    .pillar-body p:not(.pillar-anchor) {
      max-width: 820px;
      margin: 18px 0 0;
      color: rgba(255, 255, 255, 0.76);
      font-size: clamp(0.88rem, 1vw, 0.98rem);
      line-height: 1.62;
    }

    .pillar-body ul {
      display: grid;
      gap: 10px;
      padding: 0;
      margin: 24px 0 0;
      list-style: none;
    }

    .pillar-body li {
      position: relative;
      padding-left: 22px;
      color: rgba(255, 255, 255, 0.78);
      font-size: clamp(0.82rem, 0.94vw, 0.92rem);
      line-height: 1.42;
    }

    .pillar-body li::before {
      position: absolute;
      top: 0.54em;
      left: 0;
      width: 8px;
      height: 8px;
      content: "";
      background: var(--pillar-accent);
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 999px;
    }

    .method-closing .section-kicker {
      margin-bottom: 22px;
      white-space: normal;
    }

    .method-closing h3 {
      margin: 0;
      color: var(--white);
      font-size: clamp(2rem, 4.2vw, 3.7rem);
      font-weight: 900;
      line-height: 1.06;
      letter-spacing: 0;
    }

    .method-closing p {
      max-width: 680px;
      margin: 22px auto 0;
      font-size: clamp(0.98rem, 1.1vw, 1.08rem);
      line-height: 1.6;
    }

    .method-cta {
      margin-top: 30px;
    }

    .news-section {
      position: relative;
      padding: clamp(52px, 5.2vw, 82px) max(56px, calc((100vw - 1140px) / 2)) clamp(54px, 5.2vw, 84px);
      overflow: hidden;
      background: transparent;
    }

    .news-shell {
      position: relative;
      z-index: 1;
      max-width: 1140px;
      margin: 0 auto;
    }

    .news-section .section-head {
      max-width: 1040px;
    }

    .news-section .section-kicker {
      color: rgba(255, 255, 255, 0.86);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.035);
    }

    .news-section .section-head h2 {
      font-size: clamp(2.25rem, 4.25vw, 4.05rem);
      line-height: 1;
    }

    .news-title-line {
      display: block;
      white-space: nowrap;
    }

    .news-section .section-head p:not(.section-kicker) {
      max-width: 620px;
      color: rgba(255, 255, 255, 0.68);
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(18px, 2.2vw, 28px);
      margin-top: clamp(28px, 3.6vw, 46px);
    }

    .news-card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 16px;
      color: #1e293b;
      background: #ffffff;
      border: 1px solid rgba(33, 70, 173, 0.07);
      border-radius: 28px;
      box-shadow: 0 12px 32px rgba(9, 16, 56, 0.04);
      transition: transform 300ms cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 300ms cubic-bezier(0.25, 0.8, 0.25, 1), border-color 300ms cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .news-card:hover {
      transform: translateY(-6px);
      border-color: rgba(33, 70, 173, 0.16);
      box-shadow: 0 20px 40px rgba(9, 16, 56, 0.09);
    }

    .news-visual {
      position: relative;
      height: 200px;
      border-radius: 18px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      transition: transform 300ms cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .news-visual::before {
      content: "";
      position: absolute;
      pointer-events: none;
      inset: 16px;
      border: 1px solid rgba(33, 70, 173, 0.16);
      border-radius: 12px;
      background:
        linear-gradient(90deg, rgba(33, 70, 173, 0.12) 1px, transparent 1px),
        linear-gradient(180deg, rgba(33, 70, 173, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.7;
      -webkit-mask-image: linear-gradient(120deg, #000, transparent 85%);
      mask-image: linear-gradient(120deg, #000, transparent 85%);
    }

    .news-card.is-management .news-visual {
      background-image: url("assets/bim_technology.png");
    }

    .news-card.is-field .news-visual {
      background-image: url("assets/construction_market.png");
    }

    .news-card.is-finance .news-visual {
      background-image: url("assets/sustainable_concrete.png");
    }

    .news-card-body {
      padding: 20px 8px 8px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .news-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: #2146AD;
      font-size: 0.68rem;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .news-meta::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #56E268;
      box-shadow: 0 0 8px rgba(86, 226, 104, 0.4);
    }

    .news-card h3 {
      margin: 0;
      color: #0c142c;
      font-size: clamp(1.18rem, 1.45vw, 1.42rem);
      font-weight: 850;
      line-height: 1.25;
      letter-spacing: -0.03em;
    }

    .news-card p {
      margin: 12px 0 0;
      color: #475569;
      font-size: 0.94rem;
      line-height: 1.55;
    }

    .news-card__cta {
      margin-top: auto;
      padding-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #2146AD;
      font-size: 0.8rem;
      font-weight: 850;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: color 180ms ease;
      width: fit-content;
    }

    .news-card__cta:hover {
      color: #122c7a;
    }

    .news-card__cta:focus-visible {
      outline: 2px dashed #2146AD;
      outline-offset: 4px;
    }

    .news-card__cta::after {
      content: "→";
      font-size: 1.05rem;
      line-height: 1;
      transform: translateY(-0.5px);
      transition: transform 180ms cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .news-card__cta:hover::after {
      transform: translate(4px, -0.5px);
    }

    @media (max-width: 920px) {
      .news-section {
        padding-right: 20px;
        padding-left: 20px;
      }

      .news-grid {
        grid-template-columns: 1fr;
        max-width: 720px;
        margin-right: auto;
        margin-left: auto;
        gap: 24px;
      }

      .news-card {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 16px;
        align-items: center;
        padding: 16px;
      }

      .news-visual {
        height: 220px;
        min-height: 0;
      }

      .news-card-body {
        padding: 8px;
      }
    }

    @media (max-width: 640px) {
      .news-section {
        padding-top: 48px;
        padding-bottom: 52px;
      }

      .news-section .section-head h2 {
        font-size: clamp(2rem, 9vw, 2.7rem);
      }

      .news-title-line {
        white-space: normal;
      }

      .news-card {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .news-visual {
        width: 100%;
        height: 190px;
      }

      .news-card-body {
        padding: 20px 8px 8px;
      }
    }

    .faq-section {
      position: relative;
      padding: clamp(18px, 2.4vw, 30px) max(40px, calc((100vw - 1140px) / 2)) clamp(34px, 4.4vw, 54px);
      overflow: visible;
      background: transparent;
    }

    .faq-shell {
      position: relative;
      z-index: 1;
      max-width: 1040px;
      margin: 0 auto;
    }

    .faq-shell .section-head {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    .faq-section .section-head h2 {
      margin: 0 auto;
      color: var(--white);
      font-family: "Axiforma", sans-serif;
      font-size: clamp(1.4rem, 2.4vw, 2.0rem);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.02em;
      text-align: center;
    }
    @media (min-width: 641px) {
      .faq-section .section-head h2 {
        white-space: nowrap;
      }
    }

    .faq-section .section-kicker {
      color: rgba(255, 255, 255, 0.86);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.035);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .faq-list {
      display: grid;
      gap: 10px;
      margin: clamp(20px, 2.5vw, 32px) auto 0;
      max-width: 1040px;
    }

    .faq-item {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(8, 24, 68, 0.65) 0%, rgba(4, 12, 38, 0.5) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      box-shadow: 
        0 10px 24px rgba(0, 0, 0, 0.15),
