<style>
@font-face {
      font-family: "Axiforma";
      src: url("assets/axiforma-book.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Axiforma";
      src: url("assets/axiforma-semibold.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Axiforma";
      src: url("assets/axiforma-bold.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Axiforma";
      src: url("assets/axiforma-black.woff2") format("woff2");
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --black: #050505;
      --white: #ffffff;
      --cream: #e6e5d8;
      --muted: rgba(255, 255, 255, 0.68);
      --line: rgba(255, 255, 255, 0.1);
      --glass: rgba(5, 5, 5, 0.62);
      --hero-blue: #2146AD;
      --banner-ink: rgba(255, 255, 255, 0.92);
      --accent: #4db7ff;
      /* Fundo Chique Variables */
      --azul-real:     #2146AD;
      --azul-vivo:     #2f61d6;
      --azul-medio:    #193b95;
      --azul-noite:    #142f79;
      --azul-abismo:   #0f2560;
      --linha-gelo:    #9FBCF5;
      --texto-claro:   #EDF2FD;
      /* Axiforma is loaded in Webflow and should remain the primary typeface. */
      --font-primary: "Axiforma", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--azul-real);
      overscroll-behavior-y: none;
      font-family: var(--font-primary);
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      overscroll-behavior-y: none;
      color: var(--white);
      background: transparent;
      font-family: var(--font-primary);
    }

    /* ── Fundo Chique ── */
    .fundo-chique {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      background:
        radial-gradient(120% 115% at 50% -8%,
          rgba(255, 255, 255, 0.14) 0%,
          rgba(255, 255, 255, 0.04) 20%,
          transparent 42%),
        linear-gradient(180deg,
          #2b56c4 0%,
          var(--azul-real) 24%,
          var(--azul-real) 68%,
          var(--azul-medio) 100%);
    }

    .aurora {
      position: absolute;
      width: 56vmax;
      height: 56vmax;
      border-radius: 50%;
      filter: blur(78px);
      will-change: transform;
      mix-blend-mode: screen;
      opacity: 0.42;
    }

    .aurora-1 {
      top: -18vmax;
      left: -12vmax;
      background: radial-gradient(closest-side, rgba(255, 255, 255, 0.18), rgba(140, 185, 255, 0.14) 42%, transparent 72%);
      animation: deriva-1 34s ease-in-out infinite alternate;
    }

    .aurora-2 {
      bottom: -22vmax;
      right: -12vmax;
      background: radial-gradient(closest-side, rgba(94, 161, 255, 0.18), rgba(255, 255, 255, 0.06) 40%, transparent 72%);
      animation: deriva-2 42s ease-in-out infinite alternate;
    }

    @keyframes deriva-1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(5vmax, 3vmax) scale(1.08); }
    }

    @keyframes deriva-2 {
      from { transform: translate(0, 0) scale(1.02); }
      to   { transform: translate(-4vmax, -3vmax) scale(1.08); }
    }

    .aneis {
      position: absolute;
      inset: 0;
      opacity: 0.34;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.085) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.085) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
      background-size:
        64px 64px,
        64px 64px,
        160px 160px,
        160px 160px;
      background-position:
        0 0,
        0 0,
        -1px -1px,
        -1px -1px;
      animation: grade-deriva 28s linear infinite;
    }

    .aneis::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(80% 60% at 50% 18%, rgba(255, 255, 255, 0.08), transparent 70%),
        radial-gradient(70% 80% at 50% 100%, rgba(8, 20, 61, 0.16), transparent 72%);
      opacity: 0.75;
      animation: grade-pulso 10s ease-in-out infinite alternate;
    }

    @keyframes grade-deriva {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(18px, 12px, 0); }
    }

    @keyframes grade-pulso {
      from { opacity: 0.54; }
      to   { opacity: 0.82; }
    }

    .grao {
      position: absolute;
      inset: 0;
      opacity: 0.08;
      mix-blend-mode: soft-light;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%25" height="100%25" filter="url(%23n)" opacity="0.55"/></svg>');
    }

    .vinheta {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(120% 100% at 50% 42%, transparent 48%, rgba(9, 24, 70, 0.24) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(7, 20, 56, 0.18));
    }

    @media (prefers-reduced-motion: reduce) {
      .aurora,
      .aneis,
      .aneis::after { animation: none; }
    }

    .site-header {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      z-index: 9999;
      display: flex;
      justify-content: center;
      width: 100%;
      padding: 0;
      overflow: visible;
      isolation: isolate;
      pointer-events: none;
      transition:
        top 420ms cubic-bezier(0.16, 1, 0.3, 1),
        padding 420ms cubic-bezier(0.16, 1, 0.3, 1);
      will-change: top, padding;
    }

    .navbar {
      position: relative;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 24px;
      min-height: 60px;
      width: 100%;
      max-width: none;
      margin: 0 auto;
      padding: 10px max(24px, calc((100vw - 1120px) / 2));
      pointer-events: auto;
      overflow: visible; /* changed from hidden to allow dropdown overflow */
      isolation: isolate;
      background:
        linear-gradient(180deg, rgba(33, 70, 173, 0.96) 0%, rgba(28, 60, 150, 0.92) 100%);
      border: 0;
      border-bottom: 1px solid rgba(221, 233, 255, 0.14);
      border-radius: 0;
      box-shadow: 0 6px 22px rgba(4, 10, 32, 0.14);
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      transform: translateY(0) scale(1);
      transform-origin: top center;
      transition:
        max-width 420ms cubic-bezier(0.16, 1, 0.3, 1),
        min-height 420ms cubic-bezier(0.16, 1, 0.3, 1),
        padding 420ms cubic-bezier(0.16, 1, 0.3, 1),
        border-radius 420ms cubic-bezier(0.16, 1, 0.3, 1),
        border-color 320ms ease,
        background 420ms ease,
        box-shadow 420ms cubic-bezier(0.16, 1, 0.3, 1),
        transform 420ms cubic-bezier(0.16, 1, 0.3, 1),
        -webkit-backdrop-filter 420ms ease,
        backdrop-filter 420ms ease;
      will-change: max-width, min-height, padding, border-radius, box-shadow, transform, backdrop-filter;
    }

    .navbar::after {
      position: absolute;
      inset: 0;
      pointer-events: none;
      content: "";
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 58%);
      border-radius: inherit;
      opacity: 0.36;
      z-index: 0;
      transition:
        opacity 420ms ease,
        background 420ms ease,
        border-radius 420ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .brand,
    .official-partner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
    }

    .brand img {
      display: block;
      width: clamp(88px, 8.8vw, 110px);
      height: auto;
      transition: width 240ms ease;
    }

    .nav-links {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .nav-links > li > a {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 14px;
      color: rgba(244, 248, 255, 0.88);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0;
      text-decoration: none;
      text-transform: uppercase;
      border-radius: 999px;
      transition:
        color 180ms ease,
        background 180ms ease,
        transform 180ms ease,
        box-shadow 180ms ease;
    }

    .nav-links > li > a:hover,
    .nav-links > li > a:focus-visible {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
      outline: none;
    }

    .official-partner {
      transition: gap 240ms ease, padding 240ms ease, border-radius 240ms ease, background 240ms ease, border-color 240ms ease;
    }

    .official-partner span,
    .official-partner img,
    .nav-links > li > a {
      transition:
        font-size 240ms ease,
        min-height 240ms ease,
        padding 240ms ease,
        opacity 240ms ease,
        transform 220ms cubic-bezier(0.175, 0.885, 0.32, 1.275),
        color 180ms ease,
        background 180ms ease;
    }

    .site-header.is-scrolled {
      top: 14px;
      padding-right: max(56px, calc((100vw - 1140px) / 2));
      padding-left: max(56px, calc((100vw - 1140px) / 2));
    }

    .site-header.is-scrolled .navbar {
      width: 100%;
      max-width: 1140px;
      min-height: 56px;
      padding: 8px 22px;
      background:
        radial-gradient(120% 160% at 12% 0%, rgba(82, 130, 255, 0.2), transparent 48%),
        linear-gradient(180deg, rgba(10, 20, 48, 0.7), rgba(7, 14, 35, 0.58));
      border: 1px solid rgba(226, 237, 255, 0.24);
      border-radius: 18px;
      box-shadow:
        0 18px 42px rgba(4, 10, 32, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06);
      -webkit-backdrop-filter: blur(22px) saturate(165%);
      backdrop-filter: blur(22px) saturate(165%);
      transform: translateY(0) scale(0.992);
    }

    .site-header.is-scrolled .navbar::after {
      opacity: 0.52;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), transparent 62%);
    }

    .site-header.is-scrolled .brand img {
      width: clamp(78px, 7.6vw, 96px);
    }

    .site-header.is-scrolled .nav-links {
      gap: 6px;
    }

    .site-header.is-scrolled .nav-links > li > a {
      min-height: 34px;
      padding: 0 12px;
      font-size: 0.62rem;
    }

    .site-header.is-scrolled .official-partner {
      gap: 8px;
      padding: 6px 11px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(214, 229, 255, 0.12);
      border-radius: 999px;
    }

    .site-header.is-scrolled .official-partner span {
      font-size: 0.6rem;
      opacity: 0.9;
    }

    .site-header.is-scrolled .official-partner img {
      height: 14px;
      width: auto;
    }

    @media (prefers-reduced-motion: reduce) {
      .site-header,
      .navbar,
      .navbar::after,
      .brand img,
      .nav-links > li > a,
      .official-partner,
      .official-partner span,
      .official-partner img {
        transition: none !important;
      }
    }

    .nav-dropdown-wrapper {
      position: relative;
      z-index: 30;
    }

    .nav-dropdown-wrapper.is-active {
      z-index: 60;
    }

    .nav-dropdown-trigger {
      position: relative;
    }

    .nav-dropdown-wrapper.is-active > .nav-dropdown-trigger {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .dropdown-arrow-icon {
      width: 8px;
      height: 8px;
      margin-left: 6px;
      fill: none;
      stroke: currentColor;
      stroke-width: 3px;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-dropdown-wrapper.is-active .dropdown-arrow-icon {
      transform: rotate(180deg);
    }

    .nav-dropdown {
      position: absolute;
      top: calc(100% + 14px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      width: min(310px, calc(100vw - 48px));
      padding: 10px;
      background:
        linear-gradient(180deg, #f8fbff 0%, #e7efff 100%);
      border: 1px solid rgba(37, 83, 190, 0.18);
      border-radius: 16px;
      box-shadow:
        0 20px 46px rgba(7, 18, 47, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1), transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.25s;
      z-index: 1200;
    }

    .nav-dropdown::before {
      position: absolute;
      top: -6px;
      left: 50%;
      width: 12px;
      height: 12px;
      content: "";
      background: #f8fbff;
      border-top: 1px solid rgba(37, 83, 190, 0.16);
      border-left: 1px solid rgba(37, 83, 190, 0.16);
      transform: translateX(-50%) rotate(45deg);
    }

    .nav-dropdown::after {
      content: none;
    }

    .nav-dropdown-wrapper.is-active .nav-dropdown {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .nav-dropdown-head {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 4px;
      padding: 6px 8px 10px;
      margin-bottom: 6px;
      border-bottom: 1px solid rgba(37, 83, 190, 0.12);
    }

    .nav-dropdown-kicker {
      color: rgba(36, 73, 162, 0.62);
      font-size: 0.54rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav-dropdown-title {
      color: #0b1a3f;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.28;
      letter-spacing: 0;
    }

    .nav-dropdown-list {
      position: relative;
      z-index: 1;
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-dropdown-list li {
      margin: 0;
      padding: 0;
    }

    .nav-dropdown-list a {
      display: flex !important;
      align-items: flex-start;
      gap: 10px;
      padding: 10px;
      color: #0f214e !important;
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 600;
      border-radius: 12px;
      text-transform: none !important;
      background: rgba(255, 255, 255, 0.58) !important;
      border: 1px solid rgba(37, 83, 190, 0.1);
      min-height: 0 !important;
      width: 100%;
      box-sizing: border-box;
      transition:
        background 0.2s ease,
        color 0.2s ease,
        transform 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.2s ease !important;
      transform: none !important;
    }

    .nav-dropdown-list a:hover {
      background: #ffffff !important;
      color: #0b1a3f !important;
      transform: translateX(4px) !important;
      border-color: rgba(37, 83, 190, 0.24);
      box-shadow: 0 8px 18px rgba(37, 83, 190, 0.12);
    }

    .dropdown-item-logo {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
      margin-top: 2px;
      color: #2553be;
    }

    .dropdown-link-body {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .dropdown-link-title {
      color: #0b1a3f;
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.16;
      letter-spacing: 0;
    }

    .dropdown-link-copy {
      color: rgba(15, 33, 78, 0.64);
      font-size: 0.62rem;
      font-weight: 500;
      line-height: 1.34;
      letter-spacing: 0;
    }

    .official-partner {
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(214, 229, 255, 0.12);
      border-radius: 999px;
    }

    .official-partner span {
      color: rgba(244, 248, 255, 0.8);
      font-size: 0.52rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      text-align: right;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .official-partner img {
      display: block;
      width: auto;
      height: 15px;
    }

    .riow-logo-link {
      display: inline-flex;
      align-items: center;
      color: inherit;
      text-decoration: none;
      line-height: 0;
      vertical-align: middle;
    }

    .riow-logo-link:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 3px;
      border-radius: 999px;
    }

    .inline-riow-logo {
      display: inline-block;
      width: auto;
      height: 0.9em;
      margin: 0 0.12em;
      vertical-align: -0.12em;
      filter: none;
      opacity: 1;
    }

    .inline-riow-logo.inline-riow-logo-wordmark {
      height: 0.72em;
      aspect-ratio: 599.56 / 109.78;
      background-color: currentColor;
      -webkit-mask: url("https://cdn.prod.website-files.com/6492e8ffc454a19867291571/6a2c48775857d6e93c22030f_Ativo%2050.png") center / contain no-repeat;
      mask: url("https://cdn.prod.website-files.com/6492e8ffc454a19867291571/6a2c48775857d6e93c22030f_Ativo%2050.png") center / contain no-repeat;
    }

    .hero .inline-riow-logo,
    .site-footer-copy .inline-riow-logo {
      filter: none;
      opacity: 1;
    }

    .founder-spotlight .inline-riow-logo,
    .inline-riow-logo.logo-original {
      filter: none;
      opacity: 1;
    }

    .inline-riow-logo.logo-muted {
      filter: grayscale(1) brightness(0.72);
      opacity: 0.76;
    }

    .hero {
      position: relative;
      z-index: 0;
      min-height: 85vh;
      overflow: hidden;
      background: transparent;
    }

    .slides {
      position: absolute;
      inset: 0;
      border-radius: 0;
      overflow: hidden;
      background: transparent;
    }

    .slides::after {
      position: absolute;
      right: max(56px, calc((100vw - 1140px) / 2));
      bottom: 0;
      left: max(56px, calc((100vw - 1140px) / 2));
      z-index: 8;
      height: 1px;
      pointer-events: none;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.84) 18%, rgba(255, 255, 255, 0.84) 82%, transparent);
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 0 max(56px, calc((100vw - 1140px) / 2));
      padding-bottom: 130px;
      opacity: 0;
      background: var(--slide-bg);
      transition: opacity 800ms ease;
    }

    .slide.is-active {
      z-index: 2;
      opacity: 1;
    }

    .slide-main {
      --slide-bg:
        linear-gradient(90deg, rgba(5, 11, 34, 0.76) 0%, rgba(5, 11, 34, 0.58) 36%, rgba(5, 11, 34, 0.12) 64%, rgba(5, 11, 34, 0.18) 100%),
        url("https://cdn.prod.website-files.com/6492e8ffc454a19867291571/6a2bf5811662849f1bcfb494_banner-principal.jpg") center center / cover no-repeat;
    }
    .slide-1 { --slide-bg: rgba(33, 70, 173, 0.45); }
    .slide-2 { --slide-bg: rgba(16, 19, 31, 0.6); }
    .slide-3 { --slide-bg: rgba(8, 113, 95, 0.45); }

    .slide-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-self: flex-start;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 18px 0 calc(18px + 0.18em);
      margin: 0 0 18px;
      font-family: "Axiforma", sans-serif;
      font-size: clamp(0.54rem, 0.68vw, 0.64rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.86);
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      backdrop-filter: blur(16px) saturate(140%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .hero h1 {
      margin: 0;
      font-family: "Axiforma", sans-serif;
      font-size: clamp(2.18rem, 3.5vw, 3.1rem);
      font-weight: 900;
      line-height: 1.04;
      letter-spacing: -0.035em;
      color: var(--white);
    }

    .slide-main h1 {
      max-width: 13.8em;
    }

    .hero-desc {
      max-width: 560px;
      margin: 24px 0 0;
      font-family: "Axiforma", sans-serif;
      font-size: clamp(0.88rem, 1.02vw, 1rem);
      font-weight: 500;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.6);
    }

    .hero-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
