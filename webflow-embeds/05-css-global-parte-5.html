      transition: opacity 250ms ease;

    }

      opacity: 1;
      transform: translateY(0) scale(1);

      pointer-events: none;
      content: "";

      background: radial-gradient(circle at 90% 0%, rgba(255, 255, 255, 0.08), transparent 32%);
