    .resources-advantage-stack {
      display: grid;
      position: relative;
      gap: 10px;
    }

    .resources-advantage-pill {
      display: grid;
      grid-template-columns: 12px auto;
      width: 100%;
      align-self: stretch;
      align-items: center;
      justify-content: start;
      gap: 8px;
      min-height: 32px;
      padding: 7px 10px 7px 9px;
      color: #2f7d43;
      font-size: 0.58rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.005em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #d8f8cd 0%, #cbf2bf 100%);
      border: 1px solid rgba(47, 125, 67, 0.08);
      border-radius: 14px;
      white-space: nowrap;
    }

    .resources-pricing-card.is-copilot .resources-advantage-pill.is-blue {
      position: absolute;
      right: 0;
      bottom: calc(100% + 12px);
      left: 0;
      grid-template-columns: 16px auto;
      gap: 10px;
      min-height: 38px;
      padding: 8px 14px 8px 12px;
      color: #2146AD;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, rgba(230, 240, 255, 0.98) 0%, rgba(212, 228, 255, 0.96) 100%);
      border-color: rgba(33, 70, 173, 0.28);
      border-radius: 18px;
      box-shadow: 
        0 4px 12px rgba(33, 70, 173, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      pointer-events: none;
    }

    .resources-advantage-pill.is-blue .resources-advantage-icon {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      border-color: rgba(33, 70, 173, 0.28);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.45);
    }

    .resources-advantage-pill.is-blue .resources-advantage-icon::after {
      top: 45%;
      left: 50%;
      width: 3px;
      height: 6px;
      border-right: 1.8px solid #2146AD;
      border-bottom: 1.8px solid #2146AD;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .resources-advantage-icon {
      position: relative;
      width: 12px;
      height: 12px;
      flex: 0 0 12px;
      background: rgba(255, 255, 255, 0.26);
      border: 1px solid rgba(47, 125, 67, 0.22);
      border-radius: 4px;
    }

    .resources-advantage-icon::before {
      content: none;
    }

    .resources-advantage-icon::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 4px;
      border-right: 1.4px solid #2f7d43;
      border-bottom: 1.4px solid #2f7d43;
      transform: translate(-42%, -58%) rotate(45deg);
    }

    .resources-pricing-footer {
      margin-top: 0;
      display: grid;
      gap: 14px;
    }

    .resources-price-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 10px 16px;
      padding: 0;
    }

    .resources-price-row::before {
      content: none;
    }

    .resources-price-row > * {
      position: relative;
      z-index: 1;
    }

    .resources-price-main {
      display: inline-flex;
      align-items: flex-end;
      font-family: "Axiforma", sans-serif;
      font-weight: 400;
      color: #05070c;
      white-space: nowrap;
    }
