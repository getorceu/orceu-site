<script>

    const slides = Array.from(document.querySelectorAll(".slide"));
    const arrows = Array.from(document.querySelectorAll(".slider-arrow"));
    const slidesContainer = document.querySelector(".slides");
    const colors = ["#2146AD", "#2146AD", "#10131F", "#08715F"];
    const slideDurations = [18000, 12000, 12000, 12000];
    let cur = 0;
    let timer = setTimeout(next, slideDurations[cur]);

    function go(i) {
      cur = (i + slides.length) % slides.length;
      slides.forEach((s, idx) => s.classList.toggle("is-active", idx === cur));
      slidesContainer.style.background = colors[cur];
      reset();
    }

    function next() { go(cur + 1); }

    function reset() {
      clearTimeout(timer);
      timer = setTimeout(next, slideDurations[cur] || 12000);
    }

    arrows.forEach(a => a.addEventListener("click", () => { go(cur + +a.dataset.dir); }));

    (() => {
      const faqItems = Array.from(document.querySelectorAll(".faq-item"));
      if (!faqItems.length) return;

      const duration = 380;
      const answerHeightBuffer = 96;

      faqItems.forEach((item) => {
        const question = item.querySelector(".faq-question");
        const answer = item.querySelector(".faq-answer");
        let closeTimer = null;

        if (!question || !answer) return;

        const measureAnswer = () => {
          item.style.setProperty("--faq-answer-height", `${answer.scrollHeight + answerHeightBuffer}px`);
        };

        if (item.open) measureAnswer();

        question.addEventListener("click", (event) => {
          event.preventDefault();
          window.clearTimeout(closeTimer);
          measureAnswer();

          if (item.open) {
            item.classList.add("is-closing");
            closeTimer = window.setTimeout(() => {
              item.open = false;
              item.classList.remove("is-closing");
              measureAnswer();
            }, duration);
            return;
          }

          item.open = true;
          item.classList.remove("is-closing");
          requestAnimationFrame(measureAnswer);
        });

        window.addEventListener("resize", measureAnswer, { passive: true });
      });
    })();

    const audienceCarousel = document.querySelector("[data-audience-carousel]");
    if (audienceCarousel) {
      const audienceCards = Array.from(audienceCarousel.querySelectorAll("[data-audience-card]"));
      const audienceDots = Array.from(audienceCarousel.querySelectorAll("[data-audience-dot]"));
      const audienceNav = Array.from(audienceCarousel.querySelectorAll("[data-audience-dir]"));
      const audienceViewport = audienceCarousel.querySelector(".audience-viewport");
      const audienceTrack = audienceCarousel.querySelector(".audience-track");
      const AUDIENCE_INTERVAL = 3600;
      let audienceCurrent = 0;
      let audienceStartX = 0;
      let audienceTimer = null;
      let audienceAnimationTimer = null;

      function getAudienceOffset(index) {
        let offset = index - audienceCurrent;
        if (offset > audienceCards.length / 2) offset -= audienceCards.length;
        if (offset < -audienceCards.length / 2) offset += audienceCards.length;
        return offset;
      }

      function setAudienceProfile(index) {
        audienceCurrent = (index + audienceCards.length) % audienceCards.length;
        clearTimeout(audienceAnimationTimer);
        audienceCards.forEach((card, cardIndex) => {
          const offset = getAudienceOffset(cardIndex);
          const isActive = offset === 0;
          card.classList.toggle("is-active", isActive);
          card.classList.toggle("is-entering", isActive);
          card.classList.toggle("is-before", !isActive && offset < 0);
          card.classList.toggle("is-after", !isActive && offset > 0);
          card.style.setProperty("--audience-offset", String(offset));
          card.style.zIndex = isActive ? "3" : "1";
          card.style.boxShadow = isActive ? "0 34px 90px rgba(3, 12, 50, 0.26)" : "";
        });
        audienceAnimationTimer = setTimeout(() => {
          audienceCards.forEach((card) => card.classList.remove("is-entering"));
        }, 840);
        audienceDots.forEach((dot, dotIndex) => {
          dot.classList.toggle("is-active", dotIndex === audienceCurrent);
        });
        requestAnimationFrame(centerAudienceProfile);
      }

      function centerAudienceProfile() {
        if (!audienceViewport || !audienceTrack) return;
        audienceTrack.style.transform = "";
      }

      function startAudienceAutoplay() {
        clearInterval(audienceTimer);
        audienceTimer = setInterval(() => {
          setAudienceProfile(audienceCurrent + 1);
        }, AUDIENCE_INTERVAL);
      }

      audienceNav.forEach(button => {
        button.addEventListener("click", () => {
          setAudienceProfile(audienceCurrent + Number(button.dataset.audienceDir));
          startAudienceAutoplay();
        });
      });

      audienceDots.forEach(dot => {
        dot.addEventListener("click", () => {
          setAudienceProfile(Number(dot.dataset.audienceDot));
          startAudienceAutoplay();
        });
      });

      audienceCards.forEach(card => {
        card.addEventListener("click", () => {
          setAudienceProfile(Number(card.dataset.audienceCard));
          startAudienceAutoplay();
        });
      });

      audienceCarousel.addEventListener("pointerdown", event => {
        audienceStartX = event.clientX;
      });

      audienceCarousel.addEventListener("pointerup", event => {
        const delta = event.clientX - audienceStartX;
        if (Math.abs(delta) < 42) return;
        setAudienceProfile(audienceCurrent + (delta < 0 ? 1 : -1));
        startAudienceAutoplay();
      });

      window.addEventListener("resize", centerAudienceProfile, { passive: true });
      setAudienceProfile(audienceCurrent);
      startAudienceAutoplay();
    }

    (function () {
      const root = document.querySelector(".pf-profiles");
      if (!root) return;

      const deck = root.querySelector(".pf-deck");
      const cards = Array.from(root.querySelectorAll(".pf-card"));
      const dotsBox = root.querySelector(".pf-dots");
      const prevBtn = root.querySelector(".pf-arrow--prev");
      const nextBtn = root.querySelector(".pf-arrow--next");
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const total = cards.length;
      const PROFILE_TOTAL_MS = 4500;
      const PROFILE_TRANSITION_MS = 500;
      const PROFILE_READING_MS = PROFILE_TOTAL_MS - PROFILE_TRANSITION_MS;

      let active = 0;
      let timer = null;
      let transitionTimer = null;
      let leaveTimer = null;
      let startX = null;

      if (!deck || !cards.length || !dotsBox || !prevBtn || !nextBtn) return;

      cards.forEach((_, index) => {
        const dot = document.createElement("button");
        dot.className = "pf-dot";
        dot.type = "button";
        dot.setAttribute("aria-label", "Ir para o perfil " + (index + 1));
        dot.addEventListener("click", () => {
          go(index);
          restart();
        });
        dotsBox.appendChild(dot);
      });

      const dots = Array.from(dotsBox.children);

      function sizeDeck() {
        const copyEl = root.querySelector(".pf-copy");
        const stackOffsetY = window.innerWidth <= 640 ? 28 : window.innerWidth <= 920 ? 36 : 44;
        cards.forEach((card) => {
          card.style.height = "auto";
        });
        const leftHeight = copyEl ? copyEl.offsetHeight : 0;
        let maxCardNaturalHeight = 0;
        cards.forEach((card) => {
          maxCardNaturalHeight = Math.max(maxCardNaturalHeight, card.scrollHeight);
        });
        const finalHeight = Math.max(leftHeight, maxCardNaturalHeight);
        cards.forEach((card) => {
          card.style.height = finalHeight + "px";
        });
        deck.style.height = finalHeight + stackOffsetY + "px";
      }

      function render() {
        // Toggle featured-active class on deck for button styling
        if (deck && cards.length) {
          const activeCard = cards[active];
          const isFeatured = activeCard && activeCard.classList.contains("pf-card--featured");
          deck.classList.toggle("has-featured-active", isFeatured);
        }

        cards.forEach((card, index) => {
          const position = (index - active + total) % total;
          const isActive = position === 0;
          const isDepthOne = position === 1;
          const isDepthTwo = position === 2;
          const isPrevious = position === total - 1;

          card.classList.toggle("is-active", isActive);
          card.classList.toggle("is-depth", isDepthOne || isDepthTwo);
          card.classList.toggle("is-hidden", !isActive && !isDepthOne && !isDepthTwo);
          card.classList.remove("is-leaving");

          card.style.pointerEvents = isActive ? "auto" : "none";

          if (isActive) {
            card.style.setProperty("--pf-x", "0px");
            card.style.setProperty("--pf-y", "0px");
            card.style.setProperty("--pf-scale", "1");
            card.style.setProperty("--pf-rotate", "0deg");
            card.style.setProperty("--pf-opacity", "1");
            card.style.setProperty("--pf-blur", "0px");
            card.style.zIndex = String(total + 4);
          } else if (isDepthOne) {
            card.style.setProperty("--pf-x", "24px");
            card.style.setProperty("--pf-y", "18px");
            card.style.setProperty("--pf-scale", ".968");
            card.style.setProperty("--pf-rotate", ".35deg");
            card.style.setProperty("--pf-opacity", ".84");
            card.style.setProperty("--pf-blur", "0px");
            card.style.zIndex = String(total + 2);
          } else if (isDepthTwo) {
            card.style.setProperty("--pf-x", "46px");
            card.style.setProperty("--pf-y", "36px");
            card.style.setProperty("--pf-scale", ".94");
            card.style.setProperty("--pf-rotate", ".7deg");
            card.style.setProperty("--pf-opacity", ".58");
            card.style.setProperty("--pf-blur", ".2px");
            card.style.zIndex = String(total + 1);
          } else {
            card.style.setProperty("--pf-x", isPrevious ? "-68px" : "64px");
            card.style.setProperty("--pf-y", isPrevious ? "-22px" : "54px");
            card.style.setProperty("--pf-scale", isPrevious ? ".948" : ".91");
            card.style.setProperty("--pf-rotate", isPrevious ? "-2deg" : "1deg");
            card.style.setProperty("--pf-opacity", "0");
            card.style.setProperty("--pf-blur", "2px");
            card.style.zIndex = isPrevious ? String(total + 3) : "1";
          }
        });

        dots.forEach((dot, index) => {
          dot.setAttribute("aria-current", index === active ? "true" : "false");
        });

      }

      function markLeaving(index, direction = 1) {
        const outgoing = cards[index];
        if (!outgoing || reducedMotion) return;
        clearTimeout(leaveTimer);
        outgoing.style.setProperty("--pf-leave-x", direction > 0 ? "-72px" : "72px");
        outgoing.style.setProperty("--pf-leave-rotate", direction > 0 ? "-2deg" : "2deg");
        requestAnimationFrame(() => outgoing.classList.add("is-leaving"));
      }

      function clearLeaving(index) {
        const outgoing = cards[index];
        if (outgoing) outgoing.classList.remove("is-leaving");
      }

      function go(index, options = {}) {
        const previous = active;
        const nextIndex = (index + total) % total;
        if (nextIndex === active) return;

        const step = (nextIndex - active + total) % total;
        const direction = step === 1 || step < total / 2 ? 1 : -1;
        active = nextIndex;
        render();

        const shouldAnimateOutgoing = options.animateOutgoing !== false;
        const outgoing = cards[previous];
        if (outgoing && !reducedMotion && shouldAnimateOutgoing) {
          clearTimeout(leaveTimer);
          outgoing.style.setProperty("--pf-leave-x", direction > 0 ? "-72px" : "72px");
          outgoing.style.setProperty("--pf-leave-rotate", direction > 0 ? "-2deg" : "2deg");
          requestAnimationFrame(() => outgoing.classList.add("is-leaving"));
          leaveTimer = setTimeout(() => {
            outgoing.classList.remove("is-leaving");
          }, PROFILE_TRANSITION_MS);
        }
      }

      function next() {
        go(active + 1);
      }

      function prev() {
        go(active - 1);
      }

      function stop() {
        clearTimeout(timer);
        clearTimeout(transitionTimer);
      }

      function start() {
        if (reducedMotion) return;
        stop();
        timer = setTimeout(() => {
          const leavingIndex = active;
          markLeaving(leavingIndex, 1);
          transitionTimer = setTimeout(() => {
            clearLeaving(leavingIndex);
            go(leavingIndex + 1, { animateOutgoing: false });
            start();
          }, PROFILE_TRANSITION_MS);
        }, PROFILE_READING_MS);
      }

      function restart() {
        stop();
        start();
      }

      nextBtn.addEventListener("click", () => {
        next();
        restart();
      });

      prevBtn.addEventListener("click", () => {
        prev();
        restart();
      });

      root.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight") {
          next();
          restart();
        }
        if (event.key === "ArrowLeft") {
          prev();
          restart();
        }
      });

      deck.addEventListener("pointerdown", (event) => {
        startX = event.clientX;
        stop();
      });

      deck.addEventListener("pointerup", (event) => {
        if (startX === null) return;
        const delta = event.clientX - startX;
        if (delta < -40) next();
        if (delta > 40) prev();
        startX = null;
        restart();
      });

      deck.addEventListener("pointercancel", () => {
        startX = null;
        restart();
      });

      window.addEventListener("resize", sizeDeck);

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(sizeDeck);
      }

      sizeDeck();
      render();
      start();
    })();

    const heroBottom = document.querySelector(".hero-bottom");
    const hero = document.querySelector(".hero");
    window.addEventListener("scroll", () => {
      const rect = hero.getBoundingClientRect();
      if (rect.bottom < 0) return;
      const t = Math.max(0, window.scrollY / hero.offsetHeight);
      heroBottom.style.transform = "translateY(" + (-t * 40) + "px)";
    }, { passive: true });

    const resourceRevealItems = document.querySelectorAll(".resource-reveal");
    resourceRevealItems.forEach((item, index) => {
      item.style.setProperty("--reveal-delay", (index % 4) * 60 + "ms");
    });

    if ("IntersectionObserver" in window) {
      const resourcesObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) return;
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        });
      }, { threshold: 0.16 });

      resourceRevealItems.forEach(item => resourcesObserver.observe(item));
    } else {
      resourceRevealItems.forEach(item => item.classList.add("is-visible"));
    }

    const resourcesJourney = document.querySelector("[data-resources-journey]");
    if (resourcesJourney) {
      const journeyButtons = Array.from(resourcesJourney.querySelectorAll("[data-stage-target]"));
      const journeyPanels = Array.from(document.querySelectorAll("[data-stage-panel]"));

      function setJourneyStage(stage) {
        journeyButtons.forEach((button) => {
          const isActive = button.dataset.stageTarget === stage;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });

        journeyPanels.forEach((panel) => {
          const isActive = panel.dataset.stagePanel === stage;
          panel.classList.toggle("is-active", isActive);
        });

        const activePanel = journeyPanels.find((panel) => panel.dataset.stagePanel === stage);
        activePanel?.querySelectorAll(".resource-reveal").forEach((item) => {
          item.classList.add("is-visible");
        });
      }

      journeyButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setJourneyStage(button.dataset.stageTarget);
        });
      });

      setJourneyStage(journeyButtons.find((button) => button.classList.contains("is-active"))?.dataset.stageTarget || "antes");
    }

    const bonusTimer = document.querySelector("[data-bonus-timer]");
    if (bonusTimer) {
      const bonusTimerValue = bonusTimer.querySelector("[data-bonus-timer-value]");
      const bonusTimerLabel = bonusTimer.querySelector("[data-bonus-timer-label]");
      const bonusTimerDuration = Number(bonusTimer.dataset.duration || 900000);
      const bonusTimerCookie = "orceu_bonus_timer_expires_at";
      let bonusTimerDeadline = null;
      let bonusTimerInterval = null;

      function getCookie(name) {
        const cookie = document.cookie
          .split("; ")
          .find((item) => item.startsWith(name + "="));

        return cookie ? decodeURIComponent(cookie.split("=").slice(1).join("=")) : null;
      }

      function setCookie(name, value, maxAgeSeconds) {
        document.cookie = [
          `${name}=${encodeURIComponent(value)}`,
          "path=/",
          `max-age=${maxAgeSeconds}`,
          "SameSite=Lax"
        ].join("; ");
      }

      function clearCookie(name) {
        document.cookie = `${name}=; path=/; max-age=0; SameSite=Lax`;
      }

      function getTimerDeadline() {
        const storedDeadline = Number(getCookie(bonusTimerCookie));
        const now = Date.now();

        if (Number.isFinite(storedDeadline) && storedDeadline > now) {
          return storedDeadline;
        }

        const nextDeadline = now + bonusTimerDuration;
        setCookie(bonusTimerCookie, String(nextDeadline), Math.ceil(bonusTimerDuration / 1000));
        return nextDeadline;
      }

      function formatRemaining(milliseconds) {
        const totalSeconds = Math.max(0, Math.ceil(milliseconds / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;

        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function renderBonusTimer() {
        const remaining = Math.max(0, bonusTimerDeadline - Date.now());
        bonusTimerValue.textContent = formatRemaining(remaining);

        if (remaining > 0) {
          bonusTimer.classList.remove("is-ended");
          bonusTimerLabel.textContent = "Oferta ativa";
          return;
        }

        bonusTimer.classList.add("is-ended");
        bonusTimerLabel.textContent = "Tempo encerrado";
        clearInterval(bonusTimerInterval);
        clearCookie(bonusTimerCookie);
      }

      bonusTimerDeadline = getTimerDeadline();
      renderBonusTimer();
      bonusTimerInterval = window.setInterval(renderBonusTimer, 1000);
    }

    (() => {
      const diagnostic = document.querySelector(".diagnostic");
      if (!diagnostic || window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

      let ticking = false;

      const updateDiagnosticParallax = () => {
        const rect = diagnostic.getBoundingClientRect();
        const viewport = window.innerHeight || document.documentElement.clientHeight;
        const progress = ((rect.top + rect.height / 2) - viewport / 2) / viewport;
        const limited = Math.max(-1, Math.min(1, progress));

        diagnostic.style.setProperty("--diagnostic-parallax-y", `${(limited * -28).toFixed(2)}px`);
        diagnostic.style.setProperty("--diagnostic-parallax-x", `${(limited * 18).toFixed(2)}px`);
        ticking = false;
      };

      const requestDiagnosticParallax = () => {
        if (ticking) return;
        ticking = true;
        window.requestAnimationFrame(updateDiagnosticParallax);
      };

      updateDiagnosticParallax();
      window.addEventListener("scroll", requestDiagnosticParallax, { passive: true });
      window.addEventListener("resize", requestDiagnosticParallax, { passive: true });
    })();
